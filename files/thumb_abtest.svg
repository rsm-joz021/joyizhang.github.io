<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2544"/>
      <stop offset="100%" stop-color="#1a4068"/>
    </linearGradient>
    <linearGradient id="barA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
    <linearGradient id="barB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff7043"/>
      <stop offset="100%" stop-color="#d84315"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="240" fill="url(#bg1)"/>

  <!-- Subtle grid lines -->
  <line x1="55" y1="80"  x2="240" y2="80"  stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="55" y1="110" x2="240" y2="110" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="55" y1="140" x2="240" y2="140" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="55" y1="170" x2="240" y2="170" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="55" y1="195" x2="240" y2="195" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Title -->
  <text x="24" y="30" font-family="system-ui,sans-serif" font-size="17" font-weight="700" fill="#ffffff">A/B Testing</text>
  <text x="24" y="50" font-family="system-ui,sans-serif" font-size="10.5" fill="rgba(255,255,255,0.5)">Call-to-Action Optimization</text>

  <!-- Bar A -->
  <rect x="75"  y="140" width="58" height="55" rx="5" fill="url(#barA)"/>
  <text x="104" y="130" font-family="system-ui,sans-serif" font-size="22" font-weight="800" fill="#4fc3f7" text-anchor="middle" opacity="0.9">A</text>
  <text x="104" y="212" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)" text-anchor="middle">Control</text>

  <!-- Bar B -->
  <rect x="158" y="100" width="58" height="95" rx="5" fill="url(#barB)"/>
  <text x="187" y="90"  font-family="system-ui,sans-serif" font-size="22" font-weight="800" fill="#ff7043" text-anchor="middle" opacity="0.9">B</text>
  <text x="187" y="212" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)" text-anchor="middle">Treatment</text>

  <!-- Stats panel -->
  <rect x="258" y="88" width="118" height="115" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <text x="317" y="112" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="0.04em">P-VALUE</text>
  <text x="317" y="140" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#4fc3f7" text-anchor="middle">0.023</text>

  <line x1="270" y1="150" x2="364" y2="150" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <text x="317" y="167" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="0.04em">LIFT</text>
  <text x="317" y="194" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#ff7043" text-anchor="middle">+8.4%</text>

  <!-- Bottom tag -->
  <rect x="24" y="222" width="178" height="13" rx="6" fill="rgba(79,195,247,0.12)"/>
  <text x="113" y="232" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">Frequentist Statistics · Hypothesis Testing</text>
</svg>
