<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2e1e"/>
      <stop offset="100%" stop-color="#2a4a30"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="240" fill="url(#bg2)"/>

  <!-- Grid lines -->
  <line x1="32" y1="80"  x2="368" y2="80"  stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="32" y1="110" x2="368" y2="110" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="32" y1="140" x2="368" y2="140" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="32" y1="170" x2="368" y2="170" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="32" y1="196" x2="368" y2="196" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Title -->
  <text x="24" y="30" font-family="system-ui,sans-serif" font-size="17" font-weight="700" fill="#ffffff">Karlan &amp; List (2007)</text>
  <text x="24" y="50" font-family="system-ui,sans-serif" font-size="10.5" fill="rgba(255,255,255,0.5)">Charitable Giving · Field Experiment Replication</text>

  <!-- Bar: Control -->
  <rect x="38"  y="125" width="62" height="71" rx="5" fill="rgba(255,255,255,0.22)"/>
  <text x="69"  y="118" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.55)" text-anchor="middle">Control</text>
  <text x="69"  y="212" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)"  text-anchor="middle">1.79%</text>

  <!-- Bar: 1:1 Match -->
  <rect x="118" y="110" width="62" height="86" rx="5" fill="#a5d6a7"/>
  <text x="149" y="102" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">1:1 Match</text>
  <text x="149" y="212" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.6)"  text-anchor="middle">2.07%</text>

  <!-- Bar: 2:1 Match -->
  <rect x="198" y="103" width="62" height="93" rx="5" fill="#66bb6a"/>
  <text x="229" y="95"  font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">2:1 Match</text>
  <text x="229" y="212" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.7)"  text-anchor="middle">2.20%</text>

  <!-- Bar: 3:1 Match -->
  <rect x="278" y="100" width="62" height="96" rx="5" fill="#2e7d32"/>
  <text x="309" y="92"  font-family="system-ui,sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">3:1 Match</text>
  <text x="309" y="212" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.8)"  text-anchor="middle">2.27%</text>

  <!-- Y-axis label -->
  <text x="392" y="100" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">Response</text>
  <text x="392" y="112" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">Rate (%)</text>

  <!-- Bottom tag -->
  <rect x="24" y="222" width="160" height="13" rx="6" fill="rgba(102,187,106,0.15)"/>
  <text x="104" y="232" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">Causal Inference · AER 2007 · Field Experiment</text>
</svg>
